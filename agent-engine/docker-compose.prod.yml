# Agent编排引擎 — Production Docker Compose
# P1-T71: Docker 生产镜像配置
#
# 验收标准:
#   - 镜像大小 <500MB
#   - healthcheck 通过
#   - 容器启动 <30s

version: '3.9'

services:
  # ─── Agent Engine Server ─────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: production
    image: agent-engine:0.1.0
    container_name: agent-engine-server
    restart: unless-stopped
    ports:
      - '${SERVER_PORT:-3000}:3000'
      - '${SCENE_PORT:-3002}:3002'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    env_file:
      - .env.postgres.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      # Mount for hot-reload in development (ignored in prod)
      - ./apps/server/src:/app/apps/server/src:ro

  # ─── PostgreSQL 16 ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agent-engine-pg-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_engine}
      POSTGRES_USER: ${POSTGRES_USER:-agent_engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
      # Init scripts for tuning
      - ./docker/postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-agent_engine} -d ${POSTGRES_DB:-agent_engine}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # ─── Redis 7 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agent-engine-redis-prod
    restart: unless-stopped
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ─── Prometheus Metrics (optional) ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: agent-engine-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - server

  # ─── Grafana (optional) ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: agent-engine-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pg_prod_data:
  redis_prod_data:
  prometheus_data:
  grafana_data:
