# Prometheus Configuration for Agent编排引擎

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Agent Engine 应用指标
  - job_name: 'agent-engine'
    static_configs:
      - targets: ['server:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # PostgreSQL 监控 (需要 prometheus-postgres-exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis 监控 (需要 redis-exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
