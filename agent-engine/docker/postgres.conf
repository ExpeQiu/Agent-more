# PostgreSQL 16 Production Tuning
# P1-T72: PostgreSQL 生产配置迁移

# ─── Connection Settings ───────────────────────────────────────────────────
max_connections = 200
superuser_reserved_connections = 3

# ─── Memory Settings ──────────────────────────────────────────────────────
shared_buffers = 256MB                  # 25% of available RAM (assumed 4GB+)
effective_cache_size = 1GB              # 50-75% of available RAM
work_mem = 16MB                        # Per-sort/hash operation
maintenance_work_mem = 128MB           # For maintenance operations
random_page_cost = 1.1                 # SSD-friendly (lower than default 4.0)
effective_io_concurrency = 200        # SSD-friendly

# ─── Write Performance ─────────────────────────────────────────────────────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# ─── Query Performance ─────────────────────────────────────────────────────
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
statement_timeout = 10000              # 10s max query time (matches requirement)
idle_in_transaction_session_timeout = 30000

# ─── Logging ───────────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off               # Log to stdout (Docker-friendly)
log_connections = off
log_disconnections = off
log_min_duration_statement = 1000     # Log queries >1s

# ─── Replication ───────────────────────────────────────────────────────────
wal_level = replica
max_wal_senders = 5
