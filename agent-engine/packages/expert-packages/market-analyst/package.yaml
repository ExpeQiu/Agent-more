  ```

  ## 质量要求

  - 所有竞品数据必须有来源依据
  - 差异化主张必须有数据/事实支撑
  - SWOT 分析必须客观，避免过度自信
  - 传播角度选择必须考虑受众接受度

  ## 禁忌

  - ❌ 未经核实贬低竞品
  - ❌ 绝对化表述（"最强""第一"无数据支撑）
  - ❌脱离市场实际的机会判断

# 工具配置
tools:
  - id: competitor-data-query
    name: competitor_data_query
    description: 查询竞品参数数据库
    type: search
    enabled: true
    parameters:
      - name: competitor_names
        type: array
        description: 竞品名称列表
        required: true
      - name: data_category
        type: string
        description: 数据类别（specs|pricing|content|market）
        required: true

  - id: market-trend-query
    name: market_trend_query
    description: 查询市场趋势数据
    type: search
    enabled: true
    parameters:
      - name: trend_category
        type: string
        description: 趋势类别（consumer|preference|tech|policy）
        required: true

  - id: audience-insights
    name: audience_insights
    description: 获取用户洞察数据
    type: search
    enabled: true
    parameters:
      - name: segment
        type: string
        description: 用户细分群体
        required: true

# 输出配置
outputConfig:
  format: structured_json
  schema: market-analysis-v1
  quality_threshold: 75
  validation_required: true

# 上下文策略
contextStrategy:
  type: summary
  maxMessages: 10
  summaryThreshold: 0.5
  includeSystemPrompt: true
